{% extends 'base.html' %}
{% block title %}
    UniLikes | Login
{% endblock %}
{% load static %}

{% block head %}
    <link rel="stylesheet" href="{% static 'votingapp/css/index.css' %}">
{% endblock %}
{% block content %}
    <main class="container">
        {% load crispy_forms_tags %}

        <div class="container mt-5" id="login_form" style=" width: 50%">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary">Login</button>
                <a class="ml" href="{% url 'votingapp:reset_request' %}">Reset password</a>
            </form>
        </div>
    </main>
{% endblock %}
